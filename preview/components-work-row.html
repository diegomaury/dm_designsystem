<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Work Row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#2a1854; padding:0; }
  .work-row { display:flex; align-items:center; padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.05); gap:20px; cursor:pointer; transition:background 150ms; }
  .work-row:hover { background:rgba(75,42,135,0.08); }
  .year { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:rgba(245,245,247,0.3); width:48px; flex-shrink:0; }
  .co { font-family:var(--font-display); font-weight:800; font-size:18px; letter-spacing:-0.015em; color:#f3f0ec; min-width:140px; }
  .desc { font-family:var(--font-body); font-size:12px; color:rgba(255,255,255,0.62); flex:1; line-height:1.4; }
  .kpi { font-family:var(--font-mono); font-size:13px; font-weight:700; color:#7aa6ff; min-width:70px; text-align:right; }
  .kpi.gold { color:#f0b429; }
  .tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; padding:3px 8px; border-radius:4px; background:rgba(122,166,255,0.12); color:#7aa6ff; margin-left:auto; }
  .label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(245,245,247,0.3); padding:10px 24px 8px; }
</style>
</head>
<body>
  <div class="label">Components · Work Row · Portfolio list</div>
  <div class="work-row">
    <div class="year">2024</div>
    <div class="co">Heineken</div>
    <div class="desc">Sistema de Innovación Corporativa · LATAM</div>
    <div class="kpi gold">+600%</div>
    <div class="tag">Programa</div>
  </div>
  <div class="work-row">
    <div class="year">2023</div>
    <div class="co">ITESM</div>
    <div class="desc">Red de Emprendimiento e Innovación</div>
    <div class="kpi">3,000+</div>
    <div class="tag">Ecosistema</div>
  </div>
  <div class="work-row">
    <div class="year">2022</div>
    <div class="co">REDUX</div>
    <div class="desc">Aceleradora de startups deeptech LATAM</div>
    <div class="kpi">900+</div>
    <div class="tag">Aceleración</div>
  </div>
</body>
</html>
