<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#120D1A; padding:24px; color:#F5F5F7; }

<body>
  <div class="tag">Satoshi · Display</div>
