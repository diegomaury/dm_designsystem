<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haz que Pase — Banners · Diego Maury</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07030f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 32px;
      font-family: var(--font-display);
      gap: 0;
    }

    /* ── NAV ROW ── */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 180ms, border-color 180ms, color 180ms;
      flex-shrink: 0;
    }
    .nav-btn:hover {
      background: rgba(124,63,190,0.22);
      border-color: rgba(124,63,190,0.55);
      color: #fff;
    }
    .nav-btn:active { transform: scale(0.93); }
    .nav-label {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      min-width: 58px;
      text-align: center;
    }

    /* ── STAGE SCALING ── */
    .stage-outer { position: relative; flex-shrink: 0; }
    .stage-scaler { transform-origin: top center; width: 1080px; height: 1080px; }

    /* ── STAGE BASE ── */
    .stage {
      width: 1080px; height: 1080px;
      position: relative;
      overflow: hidden;
      background: var(--dm-catalyst-900);
    }
    .stage.s-violet {
      background: linear-gradient(148deg, #1a0830 0%, #3a1b72 50%, #110724 100%);
    }
    .stage.s-light {
      background: #EDE5F8;
    }

    /* ── BACKGROUND: TRICOLOR BAR ── */
    .tricolor-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--dm-tricolor);
      z-index: 6;
    }

    /* ── BACKGROUND: HEX TEXTURE ── */
    .hex-bg {
      position: absolute; inset: 0;
      background-image: url('assets/hexagon-pattern.png');
      background-size: 620px auto;
      background-position: center right -50px;
      background-repeat: no-repeat;
      opacity: 0.05;
      pointer-events: none;
    }
    .s-violet .hex-bg { opacity: 0.07; }
    .s-light .hex-bg {
      background-image: url('assets/hexagon-pattern-light.png');
      background-size: 540px auto;
      background-position: center right -20px;
      opacity: 0.22;
    }

    /* ── BACKGROUND: ORB GLOWS ── */
    .orb-a {
      position: absolute;
      width: 720px; height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,63,190,0.24) 0%, transparent 65%);
      top: -220px; left: -240px;
      pointer-events: none;
    }
    .orb-b {
      position: absolute;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,92,57,0.13) 0%, transparent 65%);
      bottom: -30px; right: -110px;
      pointer-events: none;
    }
    .s-violet .orb-a { background: radial-gradient(circle, rgba(124,63,190,0.44) 0%, transparent 65%); }
    .s-violet .orb-b { background: radial-gradient(circle, rgba(255,92,57,0.16) 0%, transparent 65%); }
    .s-light .orb-a  { background: radial-gradient(circle, rgba(124,63,190,0.07) 0%, transparent 65%); }
    .s-light .orb-b  { background: radial-gradient(circle, rgba(255,92,57,0.04) 0%, transparent 65%); }

    /* ── BACKGROUND: ISOTIPO WATERMARK ── */
    .isotipo-wm {
      position: absolute;
      bottom: -55px; right: -55px;
      width: 400px; height: 400px;
      opacity: 0.038;
      filter: brightness(12);
      object-fit: contain;
      pointer-events: none;
    }
    .s-light .isotipo-wm { filter: none; opacity: 0.052; }

    /* ── TOP BAR ── */
    .top-bar {
      position: absolute;
      top: 52px; left: 72px; right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 6;
    }
    .newsletter-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dm-ember);
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(255,92,57,0.65);
    }
    .badge-name {
      font-family: var(--font-mono);
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }
    .s-light .badge-name { color: rgba(15,10,26,0.55); }

    .isotipo-mark {
      height: 52px; width: 52px;
      object-fit: contain;
      opacity: 0.88;
      filter: drop-shadow(0 2px 8px rgba(124,63,190,0.40));
    }
    .s-light .isotipo-mark {
      filter: drop-shadow(0 2px 6px rgba(124,63,190,0.20));
      opacity: 0.80;
    }

    /* ── QUOTE CONTENT ── */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 158px 72px 240px;
      transition: opacity 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    .content.fading { opacity: 0; }

    .quote-text {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 800;
      color: var(--dm-bone);
      line-height: 1.09;
      letter-spacing: -0.028em;
      text-wrap: pretty;
      position: relative;
      z-index: 2;
    }
    .s-light .quote-text { color: var(--dm-catalyst-700); }

    /* Adaptive font sizes */
    .sz-xxl { font-size: 96px; }
    .sz-xl  { font-size: 82px; }
    .sz-lg  { font-size: 70px; }
    .sz-md  { font-size: 60px; }
    .sz-sm  { font-size: 52px; }
    .sz-xs  { font-size: 44px; }

    /* Ember highlight word */
    .q-spark {
      color: var(--dm-ember);
      font-style: italic;
    }
    .s-light .q-spark { color: #d94120; }

    /* ── ATTRIBUTION ── */
    .attribution {
      position: absolute;
      bottom: 142px; left: 72px; right: 72px;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      z-index: 6;
    }
    .attr-rule {
      width: 3px;
      height: 46px;
      flex-shrink: 0;
      border-radius: 2px;
      background: var(--dm-ember);
      margin-top: 3px;
    }
    .attr-body {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .attr-label {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dm-ember);
    }
    .attr-blog {
      font-family: var(--font-body);
      font-size: 18px; font-weight: 400;
      color: rgba(245,245,247,0.52);
      line-height: 1.35;
      letter-spacing: -0.005em;
    }
    .s-light .attr-blog { color: rgba(15,10,26,0.46); }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: absolute;
      bottom: 52px; left: 72px; right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 6;
    }
    .logo-dark  { height: 52px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.82; }
    .logo-light { height: 52px; object-fit: contain; display: none; opacity: 0.88; }
    .s-light .logo-dark  { display: none; }
    .s-light .logo-light { display: block; }

    .bottom-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .bottom-url {
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.42);
    }
    .s-light .bottom-url { color: rgba(15,10,26,0.38); }

    /* ── CONTROLS ROW ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1080px;
      margin-top: 16px;
      flex-shrink: 0;
    }
    .dots-wrap { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      border: none; padding: 0;
      cursor: pointer;
      transition: background 180ms, transform 180ms;
    }
    .dot.active { background: var(--dm-amethyst); transform: scale(1.65); }
    .dot:hover:not(.active) { background: rgba(255,255,255,0.32); }

    .style-switcher { display: flex; gap: 8px; align-items: center; }
    .s-btn {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.34);
      cursor: pointer;
      transition: all 180ms;
    }
    .s-btn.active, .s-btn:hover {
      border-color: rgba(124,63,190,0.55);
      color: var(--dm-amethyst);
      background: rgba(124,63,190,0.12);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" aria-label="Anterior">&#8592;</button>
    <div class="nav-label" id="navLabel">01 / 10</div>
    <button class="nav-btn" id="nextBtn" aria-label="Siguiente">&#8594;</button>
  </div>

  <!-- Stage -->
  <div class="stage-outer" id="stageOuter">
    <div class="stage-scaler" id="stageScaler">
      <div class="stage" id="stage">

        <!-- Background layers -->
        <div class="tricolor-bar"></div>
        <div class="hex-bg"></div>
        <div class="orb-a"></div>
        <div class="orb-b"></div>
        <img class="isotipo-wm" src="assets/isotipo.svg" alt="">

        <!-- Top bar: newsletter identity -->
        <div class="top-bar">
          <div class="newsletter-badge">
            <span class="badge-dot"></span>
            <span class="badge-name">Haz que Pase</span>
          </div>
          <img class="isotipo-mark" src="assets/isotipo-gradient.png" alt="Diego Maury">
        </div>

        <!-- Quote content -->
        <div class="content" id="content">
          <p class="quote-text" id="quoteText"></p>
        </div>

        <!-- Attribution -->
        <div class="attribution">
          <div class="attr-rule"></div>
          <div class="attr-body">
            <span class="attr-label">Substack</span>
            <span class="attr-blog" id="attrBlog"></span>
          </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
          <img class="logo-dark"  src="assets/logo-horizontal.png" alt="Diego Maury">
          <img class="logo-light" src="assets/logo-alt.png"        alt="Diego Maury">
          <div class="bottom-right">
            <span class="bottom-url">diegomaury.substack.com</span>
          </div>
        </div>

      </div><!-- /stage -->
    </div><!-- /scaler -->
  </div><!-- /outer -->

  <!-- Dots + style switcher -->
  <div class="controls-row" id="controlsRow">
    <div class="dots-wrap" id="dotsWrap"></div>
    <div class="style-switcher">
      <button class="s-btn active" data-s="">Oscuro</button>
      <button class="s-btn"        data-s="s-violet">Violeta</button>
      <button class="s-btn"        data-s="s-light">Claro</button>
    </div>
  </div>

  <script>
    const quotes = [
      {
        text: "La vida continúa. Siempre habrá nuevos proyectos… si decides seguir.",
        key:  "si decides seguir",
        blog: "Mi más grande error como emprendedor"
      },
      {
        text: "Sí, va a doler. Pero también vas a florecer.",
        key:  "vas a florecer",
        blog: "Lo que me enseñó la depresión"
      },
      {
        text: "Que pase lo que tenga que pasar. Sin embargo, tendrá que alcanzarme en el camino.",
        key:  "tendrá que alcanzarme en el camino",
        blog: "Lo que ni yo sabía"
      },
      {
        text: "Nunca empiezas de cero: empiezas desde la experiencia.",
        key:  "desde la experiencia",
        blog: "Lo que me enseñó la depresión"
      },
      {
        text: "Cada error es un punto de partida hacia horizontes más amplios y significativos.",
        key:  "punto de partida",
        blog: "Ecos Antárticos: Desafíos y Lecciones con Jorge Acevedo"
      },
      {
        text: "Transformé el dolor en combustible para forjar mi propio destino, donde las riendas de mi vida están firmemente en mis manos.",
        key:  "combustible",
        blog: "Sigo aquí: Un viaje de emprendimiento e innovación"
      },
      {
        text: "Hoy entiendo que no hay nada más grande que mi propósito, mi visión y mis capacidades.",
        key:  "mi propósito, mi visión y mis capacidades",
        blog: "Mi último rechazo"
      },
      {
        text: "La resiliencia no es un talento. Es una práctica. Y se cultiva.",
        key:  "una práctica. Y se cultiva",
        blog: "Mi más grande error como emprendedor"
      },
      {
        text: "No necesitas ser experto en código, pero sí en contexto. Saber qué problema estás resolviendo es más importante que dominar un lenguaje.",
        key:  "qué problema estás resolviendo",
        blog: "Lo que aprendí construyendo una app sin saber programar"
      },
      {
        text: "Si quieres jugar en serio, tienes que pensar como estratega, actuar como líder y moverte como visionario.",
        key:  "estratega, actuar como líder y moverte como visionario",
        blog: "Lunes Negro"
      }
    ];

    function sizeClass(len) {
      if (len <= 40)  return 'sz-xxl';
      if (len <= 60)  return 'sz-xl';
      if (len <= 85)  return 'sz-lg';
      if (len <= 110) return 'sz-md';
      if (len <= 148) return 'sz-sm';
      return 'sz-xs';
    }

    function escHtml(str) {
      return str
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;');
    }

    function renderQuote(text, key) {
      if (!key || !text.includes(key)) return escHtml(text);
      const idx   = text.indexOf(key);
      const before = text.slice(0, idx);
      const after  = text.slice(idx + key.length);
      return escHtml(before) +
        '<span class="q-spark">' + escHtml(key) + '</span>' +
        escHtml(after);
    }

    let current = 0;
    let busy    = false;

    const stage    = document.getElementById('stage');
    const content  = document.getElementById('content');
    const quoteEl  = document.getElementById('quoteText');
    const blogEl   = document.getElementById('attrBlog');
    const navLabel = document.getElementById('navLabel');
    const dotsWrap = document.getElementById('dotsWrap');

    // Build dots
    quotes.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', 'Quote ' + (i + 1));
      d.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(d);
    });

    function setContent(i) {
      const q  = quotes[i];
      const sz = sizeClass(q.text.length);
      quoteEl.innerHTML = renderQuote(q.text, q.key);
      quoteEl.className = 'quote-text ' + sz;
      blogEl.textContent = q.blog;
      navLabel.textContent = String(i + 1).padStart(2, '0') + ' / ' + quotes.length;
      document.querySelectorAll('.dot').forEach((d, j) =>
        d.classList.toggle('active', j === i));
    }

    function goTo(i) {
      if (i === current || busy) return;
      busy = true;
      content.classList.add('fading');
      setTimeout(() => {
        current = i;
        setContent(i);
        content.classList.remove('fading');
        setTimeout(() => { busy = false; }, 240);
      }, 220);
    }

    document.getElementById('prevBtn').addEventListener('click', () =>
      goTo((current - 1 + quotes.length) % quotes.length));
    document.getElementById('nextBtn').addEventListener('click', () =>
      goTo((current + 1) % quotes.length));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo((current - 1 + quotes.length) % quotes.length);
      if (e.key === 'ArrowRight') goTo((current + 1) % quotes.length);
    });

    // Style switcher
    document.querySelectorAll('.s-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        stage.className = ('stage ' + btn.dataset.s).trim();
      });
    });

    // Viewport scaling
    function scaleStage() {
      const scaler   = document.getElementById('stageScaler');
      const outer    = document.getElementById('stageOuter');
      const controls = document.getElementById('controlsRow');
      const avail = Math.min(window.innerWidth - 32, window.innerHeight - 170);
      if (avail < 1080) {
        const sc = avail / 1080;
        scaler.style.transform = 'scale(' + sc + ')';
        scaler.style.transformOrigin = 'top center';
        outer.style.height = (1080 * sc) + 'px';
        outer.style.width  = (1080 * sc) + 'px';
        controls.style.maxWidth = (1080 * sc) + 'px';
      } else {
        scaler.style.transform = '';
        outer.style.height = '';
        outer.style.width  = '';
        controls.style.maxWidth = '1080px';
      }
    }
    window.addEventListener('resize', scaleStage);
    scaleStage();

    // Init
    setContent(0);
  </script>

</body>
</html>
