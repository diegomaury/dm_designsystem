<!DOCTYPE html><html lang="es"><head>


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eres mucho más chingón</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0710;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-display);
    }

    .stage {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: var(--dm-catalyst-900);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Hexagon texture background ── */
    .hex-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/hexagon-pattern.png');
      background-size: 520px auto;
      background-position: center right -60px;
      background-repeat: no-repeat;
      opacity: 0.07;
      filter: hue-rotate(0deg);
    }

    /* ── Ambient glow orbs ── */
    .orb-purple {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(106,58,158,0.28) 0%, transparent 70%);
      top: -120px;
      left: -160px;
      pointer-events: none;
    }
    .orb-ember {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,89,42,0.16) 0%, transparent 70%);
      bottom: 60px;
      right: -80px;
      pointer-events: none;
    }

    /* ── Tricolor top bar ── */
    .tricolor-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--dm-tricolor);
    }

    /* ── Isotipo watermark ── */
    .isotipo-watermark {
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 340px;
      height: 340px;
      opacity: 0.05;
      object-fit: contain;
      filter: brightness(3);
    }

    /* ── Content ── */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 88px 88px 80px 88px;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dm-ember);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 2px;
      background: var(--dm-ember);
      flex-shrink: 0;
    }

    .headline {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 108px;
      line-height: 1.00;
      letter-spacing: -0.03em;
      color: var(--dm-bone);
      text-wrap: balance;
      max-width: 860px;
    }

    .headline .word-eres   { color: var(--dm-white-60); }
    .headline .word-mucho  { color: var(--dm-white-60); }
    .headline .word-mas    { color: var(--dm-white-60); }
    .headline .word-chinon {
      color: var(--dm-ember);
      position: relative;
      display: inline-block;
      text-shadow:
        0 0 60px rgba(240,89,42,0.55),
        0 0 120px rgba(240,89,42,0.25);
    }
    .headline .word-que-todos { color: var(--dm-white-40); font-size: 62px; font-weight: 700; letter-spacing: -0.02em; }
    .headline .word-los-que   { color: var(--dm-white-40); font-size: 62px; font-weight: 700; letter-spacing: -0.02em; }
    .headline .word-te        { color: var(--dm-white-40); font-size: 62px; font-weight: 700; letter-spacing: -0.02em; }
    .headline .word-quieren   { color: var(--dm-white-40); font-size: 62px; font-weight: 700; letter-spacing: -0.02em; }
    .headline .word-chingar   {
      color: var(--dm-amethyst);
      font-size: 62px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px rgba(106,58,158,0.50);
    }

    .line-1 { display: block; margin-bottom: 4px; }
    .line-2 { display: block; margin-bottom: 4px; }
    .line-3 { display: block; }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: absolute;
      bottom: 52px;
      left: 88px;
      right: 88px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--dm-white-40);
    }

    .logo-horizontal {
      height: 44px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.75;
    }

    /* Viewport scaling */
    @media (max-width: 1120px) {
      .stage {
        width: 100vw;
        height: 100vw;
        max-width: 100vh;
        max-height: 100vh;
      }
    }
  </style>
</head>
<body style="">
  <div class="stage">
    <div class="tricolor-bar"></div>
    <div class="hex-bg"></div>
    <div class="orb-purple"></div>
    <div class="orb-ember"></div>
    <img class="isotipo-watermark" src="assets/isotipo.svg" alt="">

    <div class="content">
      <div class="eyebrow" style=""><br></div>

      <p class="headline">
        <span class="line-1">
          <span class="word-eres">Eres </span><span class="word-mucho">mucho </span><span class="word-mas">más</span>
        </span>
        <span class="line-2">
          <span class="word-chinon" style="">chingón</span>
        </span>
        <span class="line-3">
          <span class="word-que-todos">que todos </span><span class="word-los-que">los que </span><span class="word-te">te </span><span class="word-quieren">quieren </span><span class="word-chingar">chingar.</span>
        </span>
      </p>
    </div>

    <div class="bottom-bar">
      <span class="tagline" style=""><br></span>
      <img class="logo-horizontal" src="assets/logo-horizontal.png" alt="Diego Maury">
    </div>
  </div>


</body></html>
