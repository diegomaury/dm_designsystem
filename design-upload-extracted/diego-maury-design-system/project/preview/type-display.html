<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DM · Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#2a1854; padding:24px; color:#f3f0ec; }
  .tag  { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#7aa6ff; }
  .name { font-family:var(--font-display); font-weight:700; font-size:15px; margin-top:4px; color:#f3f0ec; }
  .specimen { font-family:var(--font-display); font-weight:700; font-size:64px; line-height:1; letter-spacing:-0.02em; color:#f3f0ec; margin-top:12px; }
  .specimen .spark { color:#f0592a; }
  .meta { font-family:var(--font-mono); font-size:11px; color:rgba(243,240,236,0.45); margin-top:14px; letter-spacing:0.04em; }
</style>
</head>
<body>
  <div class="tag">Montserrat · Display</div>
  <div class="name">Headlines · Names · H1</div>
  <div class="specimen">Diego <span class="spark">Maury</span></div>
  <div class="meta">Montserrat 700 · 64/64 · −2% tracking · spark naranja en palabra clave</div>
</body>
</html>
