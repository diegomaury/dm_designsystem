<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Render</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1080px; height: 1080px;
      overflow: hidden;
      background: #000;
    }
    .stage {
      width: 1080px; height: 1080px;
      position: relative; overflow: hidden;
      background: var(--dm-catalyst-900);
    }
    .stage.s-violet { background: linear-gradient(148deg,#1c0a34 0%,#38196a 52%,#130828 100%); }
    .stage.s-light  { background: #F4EEFC; }
    .hex-bg {
      position: absolute; inset: 0;
      background-image: url('assets/hexagon-pattern.png');
      background-size: 560px auto;
      background-position: center right -30px;
      background-repeat: no-repeat;
      opacity: 0.065;
      pointer-events: none;
    }
    .s-light .hex-bg {
      background-image: url('assets/hexagon-pattern-light.png');
      background-size: 480px auto;
      background-position: center right 0;
      opacity: 0.28;
    }
    .orb-a {
      position: absolute; width: 660px; height: 660px; border-radius: 50%;
      background: radial-gradient(circle, rgba(106,58,158,0.30) 0%, transparent 68%);
      top: -180px; left: -210px; pointer-events: none;
    }
    .orb-b {
      position: absolute; width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,89,42,0.17) 0%, transparent 68%);
      bottom: 30px; right: -90px; pointer-events: none;
    }
    .s-violet .orb-a { background: radial-gradient(circle, rgba(106,58,158,0.38) 0%, transparent 68%); }
    .s-light  .orb-a { background: radial-gradient(circle, rgba(106,58,158,0.10) 0%, transparent 68%); }
    .s-light  .orb-b { background: radial-gradient(circle, rgba(240,89,42,0.07) 0%, transparent 68%); }
    .tricolor-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--dm-tricolor); z-index: 4;
    }
    .isotipo-wm {
      position: absolute; bottom: -22px; right: -22px;
      width: 310px; height: 310px;
      opacity: 0.045; filter: brightness(10);
      object-fit: contain; pointer-events: none;
    }
    .s-light .isotipo-wm { filter: none; opacity: 0.065; }
    .quote-glyph {
      position: absolute; top: 50px; left: 64px;
      font-family: var(--font-display); font-size: 310px; font-weight: 900;
      line-height: 1; color: var(--dm-amethyst); opacity: 0.17;
      pointer-events: none; user-select: none; letter-spacing: -0.06em;
    }
    .s-light .quote-glyph { opacity: 0.10; }
    .stage-counter {
      position: absolute; top: 52px; right: 88px; z-index: 4;
      font-family: var(--font-mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.20em; color: rgba(255,255,255,0.28);
      display: flex; align-items: baseline; gap: 1px;
    }
    .stage-counter .cur { font-size: 17px; color: var(--dm-amethyst); }
    .s-light .stage-counter     { color: rgba(15,10,26,0.28); }
    .s-light .stage-counter .cur { color: var(--dm-amethyst); }
    .content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 118px 92px 110px 92px;
      gap: 50px;
    }
    .quote-text {
      font-family: var(--font-display); font-style: italic; font-weight: 700;
      color: var(--dm-bone); line-height: 1.12;
      letter-spacing: -0.024em; text-wrap: pretty;
      position: relative; z-index: 1;
    }
    .s-light .quote-text { color: var(--dm-catalyst-700); }
    .sz-xl { font-size: 84px; }
    .sz-lg { font-size: 72px; }
    .sz-md { font-size: 60px; }
    .sz-sm { font-size: 50px; }
    .sz-xs { font-size: 42px; }
    .attribution { display: flex; align-items: flex-start; gap: 22px; position: relative; z-index: 1; }
    .attr-rule { width: 3px; flex-shrink: 0; margin-top: 3px; border-radius: 2px; background: var(--dm-ember); height: 52px; }
    .attr-body { display: flex; flex-direction: column; gap: 7px; }
    .attr-label { font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dm-ember); }
    .attr-blog  { font-family: var(--font-body); font-size: 20px; font-weight: 400; color: rgba(245,245,247,0.58); line-height: 1.40; letter-spacing: -0.005em; }
    .s-light .attr-blog { color: rgba(15,10,26,0.52); }
    .attr-urls { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .attr-url  { font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: rgba(245,245,247,0.35); }
    .attr-url-sep { font-size: 12px; color: rgba(245,245,247,0.20); }
    .s-light .attr-url     { color: rgba(15,10,26,0.35); }
    .s-light .attr-url-sep { color: rgba(15,10,26,0.20); }
    .bottom-bar { position: absolute; bottom: 52px; left: 92px; right: 92px; display: flex; align-items: center; justify-content: space-between; z-index: 4; }
    .bottom-left { display: flex; flex-direction: column; gap: 6px; }
    .tagline-txt { font-family: var(--font-mono); font-size: 16px; font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .s-light .tagline-txt { color: rgba(15,10,26,0.55); }
    .url-row { display: flex; align-items: center; gap: 10px; }
    .url-item { font-family: var(--font-mono); font-size: 16px; font-weight: 500; letter-spacing: 0.06em; color: rgba(255,255,255,0.70); }
    .url-sep  { font-size: 14px; color: rgba(255,255,255,0.35); }
    .s-light .url-item { color: rgba(15,10,26,0.65); }
    .s-light .url-sep  { color: rgba(15,10,26,0.30); }
    .logo-img   { height: 82px; object-fit: contain; }
    .logo-dark  { filter: brightness(0) invert(1); opacity: 0.92; }
    .logo-light { display: none; opacity: 0.95; }
    .s-light .logo-dark  { display: none; }
    .s-light .logo-light { display: block; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="tricolor-bar"></div>
    <div class="hex-bg"></div>
    <div class="orb-a"></div>
    <div class="orb-b"></div>
    <img class="isotipo-wm" src="assets/isotipo.svg" alt="">
    <div class="quote-glyph">&#8220;</div>
    <div class="stage-counter">
      <span class="cur" id="curNum">01</span>
      <span>&thinsp;/&thinsp;10</span>
    </div>
    <div class="content">
      <p class="quote-text" id="quoteText"></p>
      <div class="attribution">
        <div class="attr-rule"></div>
        <div class="attr-body">
          <span class="attr-label">Substack</span>
          <span class="attr-blog" id="attrBlog"></span>
          <div class="attr-urls">
            <span class="attr-url">diegomaury.substack.com</span>
            <span class="attr-url-sep">·</span>
            <span class="attr-url">diegomaury.mx</span>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="bottom-left">
        <span class="tagline-txt">Hagamos que las cosas pasen</span>
        <div class="url-row">
          <span class="url-item">diegomaury.mx</span>
          <span class="url-sep">&middot;</span>
          <span class="url-item">diegomaury.substack.com</span>
        </div>
      </div>
      <div>
        <img class="logo-img logo-dark"  src="assets/logo-horizontal.png" alt="Diego Maury">
        <img class="logo-img logo-light" src="assets/logo-alt.png"        alt="Diego Maury">
      </div>
    </div>
  </div>
  <script>
    const quotes = [
      { text: "La vida continúa. Siempre habrá nuevos proyectos… si decides seguir.",              blog: "Mi más grande error como emprendedor" },
      { text: "Sí, va a doler. Pero también vas a florecer.",                                       blog: "Lo que me enseñó la depresión" },
      { text: "Que pase lo que tenga que pasar. Sin embargo, tendrá que alcanzarme en el camino.", blog: "Lo que ni yo sabía" },
      { text: "Nunca empiezas de cero: empiezas desde la experiencia.",                             blog: "Lo que me enseñó la depresión" },
      { text: "Cada error es un punto de partida hacia horizontes más amplios y significativos.",   blog: "Ecos Antárticos: Desafíos y Lecciones con Jorge Acevedo" },
      { text: "Transformé el dolor en combustible para forjar mi propio destino, donde las riendas de mi vida están firmemente en mis manos.", blog: "Sigo aquí: Un viaje de emprendimiento e innovación" },
      { text: "Hoy entiendo que no hay nada más grande que mi propósito, mi visión y mis capacidades.", blog: "Mi último rechazo" },
      { text: "La resiliencia no es un talento. Es una práctica. Y se cultiva.",                   blog: "Mi más grande error como emprendedor" },
      { text: "No necesitas ser experto en código, pero sí en contexto. Saber qué problema estás resolviendo es más importante que dominar un lenguaje.", blog: "Lo que aprendí construyendo una app sin saber programar" },
      { text: "Si quieres jugar en serio, tienes que pensar como estratega, actuar como líder y moverte como visionario.", blog: "Lunes Negro" }
    ];
    const styles = ['','s-violet','s-light','','s-violet','s-light','','s-violet','s-light',''];
    function sizeClass(l){ return l<=50?'sz-xl':l<=75?'sz-lg':l<=108?'sz-md':l<=132?'sz-sm':'sz-xs'; }
    function setCard(i){
      const q=quotes[i];
      document.getElementById('quoteText').textContent=q.text;
      document.getElementById('quoteText').className='quote-text '+sizeClass(q.text.length);
      document.getElementById('attrBlog').textContent=q.blog;
      document.getElementById('curNum').textContent=String(i+1).padStart(2,'0');
      document.getElementById('stage').className=('stage '+styles[i]).trim();
    }
    setCard(0);
    window.setCard = setCard;
  </script>
</body>
</html>
