document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 for layering on Catalyst/Ink surfaces */\n  --dm-white-90:      rgba(255, 255, 255, 0.90);\n  --dm-white-80:      rgba(255, 255, 255, 0.80);\n  --dm-white-60:      rgba(255, 255, 255, 0.60);\n  --dm-white-40:      rgba(255, 255, 255, 0.40);\n  --dm-white-20:      rgba(255, 255, 255, 0.20);\n  --dm-white-10:      rgba(255, 255, 255, 0.10);\n  --dm-white-06:      rgba(255, 255, 255, 0.06);\n\n  --dm-ink-80:        rgba(15, 10, 26, 0.80);\n  --dm-ink-60:        rgba(15, 10, 26, 0.60);\n  --dm-ink-40:        rgba(15, 10, 26, 0.40);\n  --dm-ink-10:        rgba(15, 10, 26, 0.10);\n\n  /* Tricolor gradient — Amethyst → Catalyst → Ember (signature) */\n  --dm-tricolor: linear-gradient(90deg, var(--dm-amethyst) 0%, var(--dm-catalyst) 55%, var(--dm-ember) 100%);\n  --dm-amethyst-grad: linear-gradient(135deg, var(--dm-amethyst) 0%, var(--dm-amethyst-600) 100%);\n\n  /* ── SEMANTIC TOKENS — DARK SURFACES (Ink / Void bg) ───── */\n  --fg-1:        var(--dm-bone);\n  --fg-2:        rgba(245, 245, 247, 0.80);\n  --fg-3:        rgba(245, 245, 247, 0.60);\n  --fg-muted:    rgba(245, 245, 247, 0.40);\n  --fg-primary:  var(--dm-amethyst);  /* CTA / brand */\n  --fg-spark:    var(--dm-ember);     /* highlight word */\n  --fg-link:     var(--dm-quantum);   /* functional links */\n  --bg-1:        var(--dm-catalyst-900);  /* Midnight Void */\n  --bg-2:        var(--dm-ink);\n  --border:      var(--dm-white-10);\n  --border-strong: var(--dm-white-40);\n\n  /* ── TYPE — FAMILIES ────────────────────────────────────── */\n  --font-display: 'Satoshi', 'Helvetica Neue', system-ui, sans-serif;\n  --font-body:    'Inter', system-ui, -apple-system, sans-serif;\n  --font-mono:    'JetBrains Mono', 'Menlo', monospace;\n\n  /* ── TYPE — SCALE ───────────────────────────────────────── */\n  --t-display:    clamp(2.5rem, 5vw, 4.5rem);\n  --t-h1:         clamp(2rem, 4.5vw, 3.75rem);\n  --t-h2:         clamp(1.75rem, 3vw, 2.5rem);\n  --t-h3:         1.5rem;\n  --t-h4:         1.25rem;\n  --t-body-lg:    1.125rem;   /* 18 */\n  --t-body:       0.875rem;   /* 14 — body principal per brand spec */\n  --t-body-sm:    0.75rem;    /* 12 — body secundario */\n  --t-mono:       0.8125rem;  /* 13 — cifras */\n  --t-mono-tag:   0.625rem;   /* 10 — etiquetas */\n\n  /* ── SPACING ────────────────────────────────────────────── */\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.5rem;\n  --space-6: 2rem;\n  --space-7: 2.5rem;\n  --space-8: 3rem;\n  --space-10: 4rem;\n  --space-12: 6rem;\n  --section-pad: clamp(4rem, 8vw, 8rem);\n\n  /* ── RADII ──────────────────────────────────────────────── */\n  --r-xs:   4px;\n  --r-sm:   6px;\n  --r-md:   10px;\n  --r-lg:   16px;\n  --r-pill: 999px;\n\n  /* ── SHADOWS ────────────────────────────────────────────── */\n  --shadow-1: 0 1px 2px rgba(15,10,26,0.30);\n  --shadow-2: 0 4px 12px rgba(15,10,26,0.18);\n  --shadow-3: 0 12px 32px rgba(15,10,26,0.30);\n  --shadow-glow-ember: 0 0 0 1px rgba(255,92,57,0.25), 0 8px 24px rgba(255,92,57,0.20);\n\n  /* ── MOTION ─────────────────────────────────────────────── */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-std: cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast: 150ms;\n  --dur-norm: 300ms;\n  --dur-slow: 600ms;\n\n  /* ── LAYOUT ─────────────────────────────────────────────── */\n  --content-max: 1100px;\n  --text-max:    720px;\n  --nav-h:       64px;\n}\n\n/* ═══════════════════════════════════════════════════════════\n   SEMANTIC TYPE STYLES — usable as classes\n   Note: brand defaults to LIGHT surfaces (off-white pages) —\n   these are colored for that. Wrap in .dm-on-dark for inverse.\n   ═══════════════════════════════════════════════════════════ */\n.dm-display {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-display);\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  color: var(--dm-catalyst-700);\n}\n.dm-h1 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-h1);\n  line-height: 1.10;\n  letter-spacing: -0.02em;\n  color: var(--dm-catalyst-700);\n}\n.dm-h2 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h2);\n  line-height: 1.15;\n  letter-spacing: -0.015em;\n  color: var(--dm-catalyst-700);\n}\n.dm-h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h3);\n  line-height: 1.25;\n  letter-spacing: -0.01em;\n  color: var(--dm-catalyst-700);\n}\n.dm-h4 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h4);\n  line-height: 1.3;\n  color: var(--dm-catalyst-700);\n}\n\n/* Spark — el highlight ember dentro de headlines (palabra clave) */\n.dm-spark {\n  color: var(--dm-ember);\n}\n.dm-body-lg {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--t-body-lg);\n  line-height: 1.6;\n  color: var(--dm-ink);\n}\n.dm-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--t-body);\n  line-height: 1.6;\n  color: var(--dm-ink);\n}\n.dm-body-sm {\n  font-family: var(--font-body);\n  font-weight: 300;\n  font-size: var(--t-body-sm);\n  line-height: 1.5;\n  color: var(--dm-ink-60);\n}\n.dm-mono {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono);\n  font-weight: 500;\n  letter-spacing: 0.04em;\n  font-variant-numeric: tabular-nums;\n}\n.dm-mono-tag {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono-tag);\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--dm-amethyst);\n}\n.dm-mono-ember {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono-tag);\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--dm-ember);\n}\n.dm-tagline {\n  /* \"HAGAMOS QUE LAS COSAS PASEN\" — JetBrains Mono · Ember */\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-size: 0.8125rem;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--dm-ember);\n}\n.dm-metric {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: clamp(2rem, 4vw, 3rem);\n  line-height: 1;\n  color: var(--dm-amethyst);\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n\n/* ── DARK SURFACE INVERSION ──────────────────────────────── */\n.dm-on-dark {\n  color: var(--dm-white);\n  background: var(--dm-ink);\n}\n.dm-on-catalyst {\n  color: var(--dm-white);\n  background: var(--dm-catalyst);\n}\n.dm-on-dark .dm-display,\n.dm-on-dark .dm-h1,\n.dm-on-dark .dm-h2,\n.dm-on-dark .dm-h3,\n.dm-on-dark .dm-h4,\n.dm-on-catalyst .dm-display,\n.dm-on-catalyst .dm-h1,\n.dm-on-catalyst .dm-h2,\n.dm-on-catalyst .dm-h3,\n.dm-on-catalyst .dm-h4 { color: var(--dm-white); }\n.dm-on-dark .dm-body-lg,\n.dm-on-dark .dm-body,\n.dm-on-catalyst .dm-body-lg,\n.dm-on-catalyst .dm-body { color: var(--dm-white-80); }\n.dm-on-dark .dm-body-sm,\n.dm-on-catalyst .dm-body-sm { color: var(--dm-white-60); }\n.dm-on-dark .dm-mono-tag,\n.dm-on-catalyst .dm-mono-tag { color: var(--dm-amethyst); }\n.dm-on-dark .dm-metric,\n.dm-on-catalyst .dm-metric { color: var(--dm-amethyst); }\n\n/* ═══════════════════════════════════════════════════════════\n   COMPONENTS — Buttons, Badges, Cards, Links\n   System: B · Violeta protagonista\n   ═══════════════════════════════════════════════════════════ */\n\n/* ── BUTTONS ────────────────────────────────────────────── */\n.dm-btn {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 0.875rem;\n  letter-spacing: -0.005em;\n  padding: 0.75rem 1.375rem;\n  border-radius: var(--r-sm);\n  border: none;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 0.5rem;\n  transition: transform var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out),\n              background var(--dur-fast) var(--ease-out);\n}\n.dm-btn:hover { transform: translateY(-1px); }\n.dm-btn:active { transform: translateY(0); }\n\n/* Primary — Amethyst gradient. Identity CTA. */\n.dm-btn-primary {\n  background: var(--dm-amethyst-grad);\n  color: var(--dm-bone);\n  box-shadow: 0 4px 14px rgba(124, 63, 190, 0.35);\n}\n.dm-btn-primary:hover {\n  box-shadow: 0 6px 20px rgba(124, 63, 190, 0.50);\n}\n\n/* Secondary — Ember outline. Spark for \"second action\". */\n.dm-btn-secondary {\n  background: transparent;\n  color: var(--dm-ember);\n  border: 1.5px solid rgba(255, 92, 57, 0.4);\n}\n.dm-btn-secondary:hover {\n  background: var(--dm-ember-soft);\n  border-color: var(--dm-ember);\n}\n\n/* Ghost — neutral on dark */\n.dm-btn-ghost {\n  background: transparent;\n  color: var(--dm-bone);\n  border: 1.5px solid var(--dm-white-20);\n}\n.dm-btn-ghost:hover {\n  border-color: var(--dm-white-40);\n  background: var(--dm-white-06);\n}\n\n/* Light surface variants */\n.dm-btn-primary-light {\n  background: var(--dm-amethyst);\n  color: var(--dm-white);\n  box-shadow: 0 4px 14px rgba(124, 63, 190, 0.25);\n}\n.dm-btn-secondary-light {\n  background: transparent;\n  color: var(--dm-ember);\n  border: 1.5px solid var(--dm-ember);\n}\n\n/* ── BADGES / CHIPS ─────────────────────────────────────── */\n.dm-badge {\n  font-family: var(--font-mono);\n  font-size: var(--t-mono-tag);\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 0.3125rem 0.625rem;\n  border-radius: var(--r-xs);\n  display: inline-flex;\n  align-items: center;\n  gap: 0.375rem;\n}\n.dm-badge-amethyst {\n  background: rgba(124, 63, 190, 0.18);\n  color: var(--dm-amethyst);\n}\n.dm-badge-ember {\n  background: var(--dm-ember-soft);\n  color: var(--dm-ember);\n}\n.dm-badge-quantum {\n  background: var(--dm-quantum-soft);\n  color: var(--dm-quantum);\n}\n.dm-badge-status::before {\n  content: \"\";\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: currentColor;\n  display: inline-block;\n}\n\n/* ── CARDS ──────────────────────────────────────────────── */\n.dm-card {\n  background: var(--dm-ink);\n  border: 1px solid var(--dm-white-06);\n  border-radius: var(--r-lg);\n  padding: var(--space-6);\n  color: var(--dm-bone);\n}\n.dm-card-light {\n  background: var(--dm-white);\n  border: 1px solid var(--dm-ink-10);\n  border-radius: var(--r-lg);\n  padding: var(--space-6);\n  box-shadow: var(--shadow-2);\n}\n.dm-card-feature {\n  background: linear-gradient(180deg, var(--dm-catalyst-900) 0%, var(--dm-ink) 100%);\n  border: 1px solid rgba(124, 63, 190, 0.20);\n  border-radius: var(--r-lg);\n  padding: var(--space-6);\n  color: var(--dm-bone);\n  position: relative;\n  overflow: hidden;\n}\n.dm-card-feature::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 2px;\n  background: var(--dm-tricolor);\n}\n\n/* ── LINKS ──────────────────────────────────────────────── */\n.dm-link {\n  color: var(--dm-quantum);\n  text-decoration: none;\n  border-bottom: 1px dashed rgba(36, 107, 253, 0.4);\n  transition: border-color var(--dur-fast) var(--ease-out);\n}\n.dm-link:hover {\n  border-bottom-style: solid;\n  border-bottom-color: var(--dm-quantum);\n}\n\n/* ── TRICOLOR SIGNATURE BAR ──────────────────────────────── */\n.dm-tricolor-bar {\n  height: 3px;\n  background: var(--dm-tricolor);\n  width: 100%;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --void: #120D1A;\n    --amethyst: #4B2672;\n    --amethyst-bright: #7C3FBE;\n    --ember: #FF5C39;\n    --quantum: #246BFD;\n    --grey: #B1B5C0;\n    --bone: #F5F5F7;\n  }\n  * { box-sizing: border-box; }\n  body { margin:0; background: #050308; padding: 28px; font-family: 'Inter', sans-serif; color: var(--bone); }\n  .page-h { font-family: 'Satoshi', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; margin: 0 0 4px; }\n  .page-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(245,245,247,0.5); margin-bottom: 26px; }\n\n  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .card { background: var(--void); border-radius: 16px;
